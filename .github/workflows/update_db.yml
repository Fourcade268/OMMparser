name: Update Mods Database

on:
  schedule:
    - cron: '0 * * * *' # Запуск каждый час
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  update-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Разрешаем боту сохранять файлы в репозиторий

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run parser
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: python parser.py

      - name: Commit and push updated database
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add mods_cache.db
          # Сохраняем только если файл реально изменился
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update mods_cache.db"
          git push