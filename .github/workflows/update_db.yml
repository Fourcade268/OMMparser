name: Update Mods Database

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Принудительно запустить ПОЛНЫЙ парсинг (очистка и загрузка всех модов)'
        required: false
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run parser
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          FORCE_FULL_UPDATE: ${{ github.event.inputs.force_full }}
        run: python parser.py

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update mods database"
          git pull --rebase origin main
          git push